<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colecții · Euromobila</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="nav-placeholder"></div>
<script src="/js/nav.js"></script>

<section class="page-hero">
  <p class="page-label">Catalog</p>
  <h1 class="page-title">Colecțiile Noastre</h1>
  <p class="page-sub">Explorează colecțiile Euromobila — fiecare reunește canapele, fotolii, paturi și mobilier într-un stil unitar.</p>
</section>
<section class="grid-section">
  <div class="item-grid" id="collections-grid">
    <p style="color:var(--text-mid);font-size:0.9rem">Se încarcă colecțiile...</p>
  </div>
</section>

<footer>
  <p>© 2025 Euromobila. Toate drepturile rezervate.</p>
  <div class="footer-links">
    <a href="#">Politica de confidențialitate</a>
    <a href="#">Termeni</a>
    <a href="#">GDPR</a>
  </div>
</footer>
<script>
fetch('/data/collections.json')
  .then(r => r.json())
  .then(collections => {
    const grid = document.getElementById('collections-grid');
    grid.innerHTML = '';
    collections.forEach(col => {
      grid.innerHTML += '<a href="/pages/colectie.html?id=' + col.id + '" class="item-card"><div class="item-img"><img src="/images/colectii/' + col.cover + '.png" alt="Colecția ' + col.name + '" class="shown"></div><div class="item-info"><h3>Colecția ' + col.name + '</h3><span>Vezi colecția completă</span></div></a>';
    });
  });
</script>
</body>
</html>
