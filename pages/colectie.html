<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colecție · Euromobila</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.back-link{display:block;padding:1.5rem 3rem 0;font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--red);text-decoration:none;margin-top:80px}
.collection-hero{position:relative;height:50vh;min-height:360px;overflow:hidden}
.collection-hero img{width:100%;height:100%;object-fit:cover;display:block}
.collection-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(20,10,5,0.85) 0%,rgba(20,10,5,0.15) 60%,transparent 100%);display:flex;align-items:flex-end;padding:3rem}
.collection-hero-text h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:2.8rem;color:var(--white)}
.collection-intro{padding:2rem 3rem;max-width:700px}
.collection-intro p{font-size:0.9rem;line-height:1.9;color:var(--text-mid);font-weight:300}
</style>
</head>
<body>
<div id="nav-placeholder"></div>
<script src="/js/nav.js"></script>

<a href="/pages/colectii.html" class="back-link">← Înapoi la Colecții</a>
<div id="collection-hero" class="collection-hero" style="display:none">
  <img id="hero-img" src="" alt="">
  <div class="collection-hero-overlay">
    <div class="collection-hero-text">
      <p class="page-label">Colecție</p>
      <h1 id="hero-title"></h1>
    </div>
  </div>
</div>
<section class="collection-intro"><p id="col-description"></p></section>
<section class="grid-section"><div class="item-grid" id="product-grid"></div></section>
<div id="not-found" style="display:none;margin-top:120px;padding:4rem 3rem;text-align:center">
  <h2 style="font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--brown);margin-bottom:1rem">Colecția nu a fost găsită.</h2>
  <a href="/pages/colectii.html" style="color:var(--red)">← Înapoi la Colecții</a>
</div>

<footer>
  <p>© 2025 Euromobila. Toate drepturile rezervate.</p>
  <div class="footer-links">
    <a href="#">Politica de confidențialitate</a>
    <a href="#">Termeni</a>
    <a href="#">GDPR</a>
  </div>
</footer>
<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
if (!id) { window.location.href = '/pages/colectii.html'; }
else {
  fetch('/data/' + id + '.json')
    .then(r => { if(!r.ok) throw new Error(); return r.json(); })
    .then(col => {
      document.title = 'Colecția ' + col.name + ' · Euromobila';
      document.getElementById('hero-img').src = '/images/colectii/' + col.cover + '.png';
      document.getElementById('hero-img').alt = col.name;
      document.getElementById('hero-title').textContent = col.name;
      document.getElementById('collection-hero').style.display = '';
      document.getElementById('col-description').textContent = col.description;
      const grid = document.getElementById('product-grid');
      col.products.forEach(p => {
        grid.innerHTML += '<a href="/pages/produs.html?collection=' + col.id + '&id=' + p.id + '" class="item-card"><div class="item-img"><img src="/images/colectii/' + p.img + '.png" alt="' + p.title + '" class="shown"></div><div class="item-info"><h3>' + p.title + '</h3><span>' + p.label + '</span></div></a>';
      });
    })
    .catch(() => { document.getElementById('not-found').style.display = ''; });
}
</script>
</body>
</html>
